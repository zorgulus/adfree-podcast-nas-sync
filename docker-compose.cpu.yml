services:
  minuspod:
    image: ttlequals0/minuspod:${MINUSPOD_VERSION:-cpu}
    ports:
      - "${MINUSPOD_PORT:-8000}:${MINUSPOD_PORT:-8000}"
    volumes:
      - ./data:/app/data
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - WHISPER_MODEL=${WHISPER_MODEL:-tiny}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS}
      - BASE_URL=${BASE_URL:-http://localhost:8000}
      - MINUSPOD_PORT=${MINUSPOD_PORT:-8000}
      - MAX_AUDIO_DOWNLOAD_MB=${MAX_AUDIO_DOWNLOAD_MB:-500}
      - MINUSPOD_TRUSTED_PROXY_COUNT=${MINUSPOD_TRUSTED_PROXY_COUNT:-0}
      - VAD_GAP_TAIL_MIN_SECONDS=${VAD_GAP_TAIL_MIN_SECONDS:-3}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:$${MINUSPOD_PORT:-8000}/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
